<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Registro de Actividades | Cinepolito Experto</title>

<style>
/* ═══════════════════════════════════════════════════════
   BASE — escritorio
   ═══════════════════════════════════════════════════════ */

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #f0f0f0;
  font-family: 'Segoe UI', Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 10px 44px;
  min-height: 100vh;
}

/* ── Toolbar ── */
.toolbar {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  background: #f0f0f0;
  padding: 8px 16px;
  border-radius: 60px;
}

.btn {
  border: none;
  border-radius: 40px;
  padding: 10px 28px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
.btn-print { background: #4a0099; color: #fff; }
.btn-clear { background: #fff; color: #444; border: 1px solid #ccc; }
.btn-add   { background: #00bcd4; color: #fff; }

/* ── Contenedor de formatos ── */
.formats-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  width: 100%;
}

.format-card {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  break-inside: avoid;
  page-break-inside: avoid;
}

/* ── Hoja ── */
.sheet {
  background: #fff;
  width: 270mm;
  min-height: 106mm;
  position: relative;
  box-shadow: 0 4px 24px #0000001a;
  display: flex;
  overflow: hidden;
  border: 1px solid #ddd;
  break-inside: avoid;
  page-break-inside: avoid;
}

/* ── Acciones de formato (duplicar/eliminar) ── */
.format-actions {
  position: absolute;
  top: 5px;
  left: 150px;
  display: flex;
  gap: 8px;
  z-index: 25;
  background: rgba(255,255,255,0.92);
  border-radius: 40px;
  padding: 4px 8px;
  border: 1px solid #e0c0ff;
}

.small-btn {
  background: #f0f0f0;
  border: none;
  font-size: 12px;
  padding: 5px 12px;
  border-radius: 30px;
  font-weight: 600;
  cursor: pointer;
  color: #333;
}
.delete-btn { background: #ffe0e0; color: #b00020; }

/* ── Barras laterales izquierdas ── */
.left-bars { display: flex; flex-shrink: 0; }
.bar-purple { width: 12px; background: #4a0099; }
.bar-teal   { width:  6px; background: #00bcd4; }

/* ── Área principal de la hoja ── */
.main {
  flex: 1;
  padding: 14px 14px 12px 12px;
  position: relative;
  display: flex;
  flex-direction: column;
}

/* ── Deco esquina inferior derecha ── */
.corner-deco {
  position: absolute;
  bottom: 0; right: 0;
  width: 80px; height: 80px;
  pointer-events: none;
  z-index: 0;
}
.corner-deco::before {
  content: '';
  position: absolute;
  bottom: 0; right: 0;
  width: 66px; height: 50px;
  background: linear-gradient(135deg, #7b1fa2 0%, #e040fb 100%);
  clip-path: polygon(35% 0%, 100% 0%, 100% 100%, 0% 100%);
}
.corner-deco::after {
  content: '';
  position: absolute;
  bottom: 50px; right: 0;
  width: 40px; height: 28px;
  background: #00bcd4;
  clip-path: polygon(28% 0%, 100% 0%, 100% 100%, 0% 100%);
}

/* ── Bloque fecha/hora (escritorio) ── */
.dt-block {
  position: absolute;
  top: 14px; right: 14px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  z-index: 1;
}
.dt-row {
  display: flex;
  align-items: baseline;
  gap: 4px;
}
.dt-lbl {
  font-size: 8.5px;
  font-weight: 600;
  color: #000;
  min-width: 58px;
}
.dt-val {
  border: none;
  border-bottom: 1.4px solid #b36be0;
  outline: none;
  font-size: 9px;
  color: #1a1a2e;
  background: transparent;
  width: 108px;
  padding: 0 2px 1px;
  cursor: pointer;
}
.dt-print { display: none; }

/* Observaciones (solo móvil) */
.observaciones-container {
  display: none;
}

/* ── Títulos de sección ── */
.sec-title {
  font-size: 13px;
  font-weight: 900;
  color: #3d0080;
  margin-top: 10px;
  margin-bottom: 6px;
  position: relative;
  z-index: 1;
}

/* ── Grids de checks ── */
.checks-ent {
  display: grid;
  grid-template-columns: 130px 160px 180px auto;
  grid-template-rows: repeat(3, 20px);
  position: relative;
  z-index: 1;
}
.checks-acr {
  display: grid;
  grid-template-columns: 130px 160px 180px 1fr;
  grid-template-rows: repeat(3, 20px);
  position: relative;
  z-index: 1;
}
.checks-ref {
  display: grid;
  grid-template-columns: 200px 220px 1fr;
  grid-template-rows: repeat(3, 22px);
  position: relative;
  z-index: 1;
}

/* ── Item de check ── */
.ci {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  user-select: none;
  width: fit-content;
}
.cb {
  width: 13px; height: 13px;
  border: 1.5px solid #9c40e0;
  border-radius: 2px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 900;
  color: transparent;
  background: #fff;
}
.ci.on .cb { background: #4a0099; border-color: #4a0099; color: #fff; }
.ci-lbl { font-size: 10px; color: #1a1a2e; line-height: 1.2; white-space: nowrap; }

/* ── Cajas de texto laterales ── */
.side-box {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding-left: 8px;
}
.sb-lbl { font-size: 8px; color: #555; font-weight: 600; }
.sb-input {
  border: 1.5px solid #9c40e0;
  border-radius: 3px;
  outline: none;
  background: #fff;
  font-size: 9.5px;
  color: #1a1a2e;
  padding: 4px 6px;
  resize: none;
  overflow: hidden;
  line-height: 1.4;
  width: 100%;
  min-height: 32px;
}
.sb-input.tall { min-height: 54px; }

.acr-bar-vip { grid-column: 4; grid-row: 1; padding-left: 10px; }
.acr-side    { grid-column: 4; grid-row: 2 / span 2; padding-left: 10px; }
.ref-side    { grid-column: 3; grid-row: 1 / span 3; }

/* ── Firmas ── */
.sigs {
  display: flex;
  margin-top: 14px;
  position: relative;
  z-index: 1;
  break-inside: avoid;
  page-break-inside: avoid;
}
.sig {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  max-width: 240px;
  margin-right: 20px;
  break-inside: avoid;
  page-break-inside: avoid;
}
.sig-line {
  border: none;
  border-bottom: 1.2px solid #9c40e0;
  outline: none;
  width: 100%;
  font-size: 10px;
  color: #1a1a2e;
  background: transparent;
  text-align: center;
  padding: 1px 6px;
}
.sig-lbl { font-size: 8.5px; color: #555; }
.firma-boton {
  background: #ede7f6;
  border: 1px solid #9c40e0;
  border-radius: 24px;
  font-size: 10px;
  padding: 4px 12px;
  cursor: pointer;
  font-weight: bold;
}
.sig-digital-container {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 35px;
  break-inside: avoid;
  page-break-inside: avoid;
}
.sig-img {
  max-width: 140px;
  max-height: 50px;
  object-fit: contain;
  background: transparent;
  border: none;
}

/* ── Evidencia fotográfica ── */
.evidence-section {
  background: #fff;
  width: 270mm;
  padding: 18px;
  border: 1px solid #ddd;
  box-shadow: 0 4px 24px #0000001a;
  break-inside: avoid;
  page-break-inside: avoid;
}
.evidence-title {
  color: #3d0080;
  font-weight: 900;
  margin-bottom: 10px;
}
.evidence-upload { margin-bottom: 12px; }
.photo-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.photo-grid img {
  width: 100%;
  height: auto;
  max-height: 220px;
  object-fit: contain;
  border-radius: 8px;
  border: 1px solid #ccc;
  background: #fff;
  break-inside: avoid;
  page-break-inside: avoid;
}

/* ── Modal firma ── */
.modal-firma {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.modal-firma.active { display: flex; }
.modal-content {
  background: white;
  border-radius: 20px;
  padding: 20px;
  width: 90%;
  max-width: 420px;
  text-align: center;
}
.modal-content canvas {
  border: 2px solid #9c40e0;
  background: #fff;
  border-radius: 12px;
  width: 100%;
  touch-action: none;
  cursor: crosshair;
}
.firma-buttons {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 16px;
  flex-wrap: wrap;
}
.firma-buttons button {
  padding: 8px 18px;
  border: none;
  border-radius: 40px;
  font-weight: bold;
  cursor: pointer;
}


/* ═══════════════════════════════════════════════════════
   RESPONSIVE MÓVIL
   ═══════════════════════════════════════════════════════ */
@media (max-width: 768px) {

  body {
    padding: 0 0 40px;
    align-items: stretch;
    overflow-x: hidden;
  }

  .toolbar {
    width: 100%;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    border-radius: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    background: #f0f0f0;
    box-shadow: 0 2px 10px #00000018;
    margin-bottom: 0;
  }
  .toolbar .btn {
    width: 88%;
    max-width: 300px;
    text-align: center;
    padding: 12px 20px;
    font-size: 15px;
  }

  .formats-container {
    padding: 16px 12px;
    gap: 24px;
    align-items: stretch;
    width: 100%;
  }

  .format-card { width: 100%; align-items: stretch; }

  .sheet {
    width: 100% !important;
    min-height: 0;
    flex-direction: column;
    overflow: visible;
    border-radius: 10px;
  }

  .left-bars {
    flex-direction: row;
    width: 100%;
    height: 10px;
    flex-shrink: 0;
  }
  .bar-purple { width: auto; flex: 2; height: 100%; }
  .bar-teal   { width: auto; flex: 1; height: 100%; }

  .main {
    padding: 10px 14px 20px;
    width: 100%;
    padding-bottom: 70px;
  }

  .format-actions {
    position: static !important;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: flex-end;
    margin-bottom: 12px;
    background: transparent;
    border: none;
    padding: 0;
    box-shadow: none;
  }
  .small-btn { font-size: 13px; padding: 8px 18px; }

  /* Bloque fecha/hora en móvil (no absoluto) */
  .dt-block {
    position: static !important;
    width: 100%;
    margin-bottom: 14px;
    gap: 8px;
  }
  .dt-row {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
  }
  .dt-lbl { font-size: 14px; min-width: 85px; font-weight: 600; }
  .dt-val {
    flex: 1;
    width: 100%;
    font-size: 14px;
    padding: 6px 6px;
    border-bottom-width: 1.5px;
  }

  .sec-title { font-size: 16px; margin-top: 20px; margin-bottom: 12px; }

  /* Grids a columna */
  .checks-ent,
  .checks-acr,
  .checks-ref {
    display: flex !important;
    flex-direction: column !important;
    gap: 12px !important;
  }

  .checks-ent .ci,
  .checks-acr .ci,
  .checks-ref .ci {
    width: 100% !important;
    padding: 6px 0;
  }

  .acr-bar-vip {
    width: 100% !important;
    padding-left: 0 !important;
  }

  .acr-side,
  .ref-side {
    width: 100% !important;
    padding-left: 0 !important;
    margin-top: 8px;
  }

  .ci {
    padding: 6px 0;
    gap: 14px;
  }
  .cb {
    width: 24px;
    height: 24px;
    font-size: 14px;
  }
  .ci-lbl {
    font-size: 15px;
    white-space: normal !important;
    line-height: 1.3;
  }

  .sb-lbl { font-size: 13px; margin-bottom: 6px; font-weight: 600; }
  .sb-input {
    font-size: 14px;
    min-height: 52px;
    padding: 10px;
  }
  .sb-input.tall { min-height: 80px; }

  /* Mostrar observaciones solo en móvil */
  .observaciones-container {
    display: block;
    width: 100%;
    margin: 20px 0 20px;
  }
  .observaciones-container .sb-lbl {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .sigs {
    flex-direction: column;
    align-items: center;
    gap: 28px;
    margin-top: 20px;
  }
  .sig {
    width: 90%;
    max-width: 100%;
    margin-right: 0 !important;
    align-items: center;
  }
  .sig-line {
    font-size: 15px;
    padding: 8px 8px;
    width: 100%;
    text-align: center;
    border-bottom-width: 1.5px;
  }
  .sig-lbl  { font-size: 13px; }
  .firma-boton { font-size: 14px; padding: 10px 24px; margin-top: 8px; }
  .sig-img { max-width: 200px; max-height: 70px; }

  .evidence-section {
    width: 100% !important;
    border-radius: 10px;
    padding: 16px;
    margin-top: 0;
  }
  .evidence-title { font-size: 16px; }
  .photo-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .photo-grid img { max-height: 160px; }

  .modal-content { width: 96%; padding: 18px 12px; }
  .firma-buttons { gap: 10px; }
  .firma-buttons button { padding: 10px 18px; font-size: 14px; }
}


/* ═══════════════════════════════════════════════════════
   IMPRESIÓN
   ═══════════════════════════════════════════════════════ */
@media print {
  @page {
    size: letter landscape;
    margin: 10mm 10mm;
  }

  body {
    background: #fff !important;
    padding: 0 !important;
    display: block !important;
    overflow-x: visible !important;
  }

  .toolbar,
  .format-actions,
  .firma-boton,
  .modal-firma,
  .evidence-upload,
  .observaciones-container {
    display: none !important;
  }

  .formats-container {
    display: block !important;
    width: 100% !important;
    padding: 0 !important;
  }

  .format-card {
    display: block !important;
    width: 100% !important;
    break-inside: avoid;
    page-break-inside: avoid;
    margin-bottom: 8mm;
  }

  .sheet {
    display: flex !important;
    flex-direction: row !important;
    width: 100% !important;
    min-height: 100mm !important;
    overflow: hidden !important;
    border: 1px solid #ccc !important;
    box-shadow: none !important;
    border-radius: 0 !important;
  }

  .left-bars {
    display: flex !important;
    flex-direction: row !important;
    width: auto !important;
    height: auto !important;
    flex-shrink: 0 !important;
  }
  .bar-purple {
    width: 12px !important;
    height: 100% !important;
    flex: unset !important;
    background: #4a0099 !important;
    min-height: 100mm;
  }
  .bar-teal {
    width: 6px !important;
    height: 100% !important;
    flex: unset !important;
    background: #00bcd4 !important;
    min-height: 100mm;
  }

  .main {
    padding: 14px 14px 12px 12px !important;
    width: auto !important;
    flex: 1 !important;
    padding-bottom: 12px !important;
  }

  /* Posición absoluta para fecha/hora en impresión */
  .dt-block {
    position: absolute !important;
    top: 14px !important;
    right: 14px !important;
    width: auto !important;
    margin-bottom: 0 !important;
  }
  .dt-lbl  { font-size: 8.5px !important; min-width: 58px !important; }
  .dt-val  { display: none !important; }
  .dt-print {
    display: inline-block !important;
    font-size: 9px !important;
    border-bottom: 1.4px solid #b36be0 !important;
    min-width: 80px !important;
    color: #1a1a2e;
  }

  /* Grids impresión */
  .checks-ent {
    display: grid !important;
    grid-template-columns: 130px 160px 180px auto !important;
    grid-template-rows: repeat(3, 20px) !important;
  }
  .checks-acr {
    display: grid !important;
    grid-template-columns: 130px 160px 180px 1fr !important;
    grid-template-rows: repeat(3, 20px) !important;
  }
  .checks-ref {
    display: grid !important;
    grid-template-columns: 200px 220px 1fr !important;
    grid-template-rows: repeat(3, 22px) !important;
  }

  .ci { padding: 0 !important; gap: 6px !important; }
  .cb { width: 13px !important; height: 13px !important; font-size: 9px !important; }
  .ci-lbl { font-size: 10px !important; white-space: nowrap !important; }

  .sec-title { font-size: 13px !important; margin-top: 10px !important; margin-bottom: 6px !important; }
  .sb-lbl    { font-size: 8px !important; }
  .sb-input  { font-size: 9.5px !important; min-height: 32px !important; padding: 4px 6px !important; }

  .sigs {
    display: flex !important;
    flex-direction: row !important;
    margin-top: 14px !important;
  }
  .sig {
    flex: 1 !important;
    max-width: 240px !important;
    margin-right: 20px !important;
  }
  .sig-line { font-size: 10px !important; }
  .sig-lbl  { font-size: 8.5px !important; }
  .sig-img  { max-width: 140px !important; max-height: 50px !important; }

  .evidence-section {
    display: block !important;
    width: 100% !important;
    border: 1px solid #ccc !important;
    margin-top: 6mm;
    padding: 14px !important;
  }
  .photo-grid {
    display: grid !important;
    grid-template-columns: repeat(3, 1fr) !important;
  }
  .corner-deco { display: block !important; }
}
</style>
</head>

<body>

<div class="toolbar">
  <button class="btn btn-add" id="btnAgregarFormato">+ Agregar otro formato</button>
  <button class="btn btn-clear" onclick="clearAllFormats()">Limpiar todo</button>
  <button class="btn btn-print" onclick="window.print()">Imprimir / Guardar PDF</button>
</div>

<div class="formats-container" id="formatsContainer"></div>

<div id="modalFirma" class="modal-firma">
  <div class="modal-content">
    <h4 style="margin-bottom:10px;">Dibuja tu firma</h4>
    <canvas id="signCanvas" width="380" height="150"></canvas>
    <div class="firma-buttons">
      <button id="btnGuardarFirma" style="background:#4a0099; color:white;">Guardar firma</button>
      <button id="btnLimpiarFirma" style="background:#ddd;">Limpiar</button>
      <button id="btnCancelarFirma" style="background:#ccc;">Cancelar</button>
    </div>
  </div>
</div>

<script>
let currentSignatureContext = null;

function getBaseFormatStructure() {
  const div = document.createElement('div');
  div.className = 'format-card';

  div.innerHTML = `
    <div class="sheet">
      <div class="left-bars">
        <div class="bar-purple"></div>
        <div class="bar-teal"></div>
      </div>

      <div class="main">
        <div class="corner-deco"></div>

        <div class="format-actions">
          <button class="small-btn duplicate-btn" type="button">Duplicar formato</button>
          <button class="small-btn delete-btn" type="button">Eliminar formato</button>
        </div>

        <div class="dt-block">
          <div class="dt-row">
            <span class="dt-lbl">Fecha:</span>
            <input class="dt-val fecha-input" type="date">
            <span class="dt-print fecha-print"></span>
          </div>
          <div class="dt-row">
            <span class="dt-lbl">Hora inicio:</span>
            <input class="dt-val inicio-input" type="time">
            <span class="dt-print inicio-print"></span>
          </div>
          <div class="dt-row">
            <span class="dt-lbl">Hora final:</span>
            <input class="dt-val final-input" type="time">
            <span class="dt-print final-print"></span>
          </div>
        </div>

        <!-- ENTRENAMIENTOS -->
        <div class="sec-title">Entrenamientos:</div>
        <div class="checks-ent">
          <div class="ci"><div class="cb">✓</div><span class="ci-lbl">Dulcería</span></div>
          <div class="ci"><div class="cb">✓</div><span class="ci-lbl">Taquilla</span></div>
          <div class="ci"><div class="cb">✓</div><span class="ci-lbl">Coffee Tree</span></div>
          <div class="ci"><div class="cb">✓</div><span class="ci-lbl">Spyral</span></div>
          <div class="ci"><div class="cb">✓</div><span class="ci-lbl">Limpieza Operativa</span></div>
          <div class="ci"><div class="cb">✓</div><span class="ci-lbl">Control de Salas</span></div>
          <div class="ci"><div class="cb">✓</div><span class="ci-lbl">Comandero RSB VIP</span></div>
          <div class="ci"><div class="cb">✓</div><span class="ci-lbl">Corredor RSB VIP</span></div>
          <div class="ci"><div class="cb">✓</div><span class="ci-lbl">Cocina Industrial VIP</span></div>
          <div class="ci"><div class="cb">✓</div><span class="ci-lbl">Bar VIP</span></div>
        </div>

        <!-- ACREDITACIONES -->

  return div;
}

function bindFormatEvents(formatCard) {
  formatCard.querySelectorAll('.ci').forEach(ci => {
    ci.addEventListener('click', (e) => {
      e.stopPropagation();
      ci.classList.toggle('on');
      saveAllToLocalStorage();
    });
  });

  formatCard.querySelectorAll('textarea, .observaciones-text, input').forEach(el => {
    el.addEventListener('input', () => {
      if (el.classList.contains('sb-input') && !el.classList.contains('observaciones-text')) {
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
      }
      updatePrintDates(formatCard);
      saveAllToLocalStorage();
    });
  });

  formatCard.querySelectorAll('.dt-val, .sig-line').forEach(input => {
    input.addEventListener('input', () => {
      updatePrintDates(formatCard);
      saveAllToLocalStorage();
    });
  });

  formatCard.querySelector('.duplicate-btn').addEventListener('click', () => duplicarFormato(formatCard));
  formatCard.querySelector('.delete-btn').addEventListener('click', () => eliminarFormato(formatCard));

  formatCard.querySelectorAll('.firma-boton').forEach(btn => {
    btn.addEventListener('click', () => {
      currentSignatureContext = btn.parentElement.querySelector('.sig-digital-container');
      abrirModalFirma();
    });
  });

  formatCard.querySelector('.evidence-upload').addEventListener('change', e => {
    const grid = formatCard.querySelector('.photo-grid');
    Array.from(e.target.files).forEach(file => {
      const reader = new FileReader();
      reader.onload = event => {
        const img = document.createElement('img');
        img.src = event.target.result;
        grid.appendChild(img);
        saveAllToLocalStorage();
      };
      reader.readAsDataURL(file);
    });
  });

  updatePrintDates(formatCard);
}

function updatePrintDates(card) {
  const fecha  = card.querySelector('.fecha-input');
  const inicio = card.querySelector('.inicio-input');
  const fin    = card.querySelector('.final-input');

  if (fecha && card.querySelector('.fecha-print')) {
    card.querySelector('.fecha-print').textContent = fecha.value ? fecha.value.split('-').reverse().join('/') : '';
  }
  if (inicio && card.querySelector('.inicio-print')) {
    card.querySelector('.inicio-print').textContent = inicio.value || '';
  }
  if (fin && card.querySelector('.final-print')) {
    card.querySelector('.final-print').textContent = fin.value || '';
  }
}

function agregarNuevoFormato() {
  const card = getBaseFormatStructure();
  bindFormatEvents(card);
  document.getElementById('formatsContainer').appendChild(card);
  saveAllToLocalStorage();
}

function duplicarFormato(original) {
  const clone = original.cloneNode(true);
  clone.querySelectorAll('.sig-digital-container').forEach(c => c.innerHTML = '');
  bindFormatEvents(clone);
  original.after(clone);
  saveAllToLocalStorage();
}

function eliminarFormato(card) {
  if (document.querySelectorAll('.format-card').length === 1) {
    alert('Debe quedar al menos un formato.');
    return;
  }
  if (confirm('¿Eliminar este formato?')) {
    card.remove();
    saveAllToLocalStorage();
  }
}

function clearAllFormats() {
  if (!confirm('¿Limpiar todos los formatos? Los datos se perderán.')) return;
  document.getElementById('formatsContainer').innerHTML = '';
  localStorage.removeItem('ce_multiformats');
  agregarNuevoFormato();
}

function abrirModalFirma() {
  const modal  = document.getElementById('modalFirma');
  const canvas = document.getElementById('signCanvas');
  const ctx    = canvas.getContext('2d');

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = '#0033cc';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  let drawing = false;

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    if (e.touches) {
      return {
        x: (e.touches[0].clientX - rect.left) * scaleX,
        y: (e.touches[0].clientY - rect.top) * scaleY
      };
    }
    return {
      x: (e.clientX - rect.left) * scaleX,
      y: (e.clientY - rect.top) * scaleY
    };
  }

  function start(e) { e.preventDefault(); drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }
  function move(e)  { if (!drawing) return; e.preventDefault(); const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); }
  function end()    { drawing = false; }

  canvas.onmousedown  = start; canvas.onmousemove  = move; canvas.onmouseup    = end; canvas.onmouseleave = end;
  canvas.ontouchstart = start; canvas.ontouchmove  = move; canvas.ontouchend   = end;

  modal.classList.add('active');
}

document.getElementById('btnGuardarFirma').addEventListener('click', () => {
  const canvas = document.getElementById('signCanvas');
  const img = document.createElement('img');
  img.src = canvas.toDataURL('image/png');
  img.className = 'sig-img';
  if (currentSignatureContext) {
    currentSignatureContext.innerHTML = '';
    currentSignatureContext.appendChild(img);
  }
  document.getElementById('modalFirma').classList.remove('active');
  saveAllToLocalStorage();
});

document.getElementById('btnLimpiarFirma').addEventListener('click', () => {
  const canvas = document.getElementById('signCanvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
});

document.getElementById('btnCancelarFirma').addEventListener('click', () => {
  document.getElementById('modalFirma').classList.remove('active');
});

function saveAllToLocalStorage() {
  const data = [];
  document.querySelectorAll('.format-card').forEach(card => {
    data.push({
      checks: Array.from(card.querySelectorAll('.ci')).map(ci => ci.classList.contains('on')),
      fecha: card.querySelector('.fecha-input')?.value || '',
      horaInicio: card.querySelector('.inicio-input')?.value || '',
      horaFinal: card.querySelector('.final-input')?.value || '',
      acrText: card.querySelector('.acr-text')?.value || '',
      refText: card.querySelector('.ref-text')?.value || '',
      observaciones: card.querySelector('.observaciones-text')?.value || '',
      nombreExperto: card.querySelector('.sig:first-child .sig-line')?.value || '',
      nombreCinepolito: card.querySelector('.sig:last-child .sig-line')?.value || '',
      firmaExperto: (() => { const img = card.querySelector('.sig:first-child .sig-digital-container img'); return img ? img.src : ''; })(),
      firmaCinepolito: (() => { const img = card.querySelector('.sig:last-child .sig-digital-container img'); return img ? img.src : ''; })(),
      fotos: Array.from(card.querySelectorAll('.photo-grid img')).map(img => img.src)
    });
  });
  localStorage.setItem('ce_multiformats', JSON.stringify(data));
}

function restoreAllFromStorage() {
  const raw = localStorage.getItem('ce_multiformats');
  if (!raw) { agregarNuevoFormato(); return; }
  try {
    const data = JSON.parse(raw);
    document.getElementById('formatsContainer').innerHTML = '';
    if (data.length === 0) { agregarNuevoFormato(); return; }
    
    data.forEach(item => {
      const card = getBaseFormatStructure();
      bindFormatEvents(card);
      
      const checks = card.querySelectorAll('.ci');
      checks.forEach((ci, i) => { if (item.checks && item.checks[i]) ci.classList.add('on'); });
      
      if (item.fecha) {
        const fecha = card.querySelector('.fecha-input');
        if (fecha) fecha.value = item.fecha;
      }
      if (item.horaInicio) {
        const inicio = card.querySelector('.inicio-input');
        if (inicio) inicio.value = item.horaInicio;
      }
      if (item.horaFinal) {
        const fin = card.querySelector('.final-input');
        if (fin) fin.value = item.horaFinal;
      }
      if (item.acrText) {
        const acr = card.querySelector('.acr-text');
        if (acr) acr.value = item.acrText;
      }
      if (item.refText) {
        const ref = card.querySelector('.ref-text');
        if (ref) ref.value = item.refText;
      }
      if (item.observaciones) {
        const obs = card.querySelector('.observaciones-text');
        if (obs) obs.value = item.observaciones;
      }
      if (item.nombreExperto) {
        const nombre = card.querySelector('.sig:first-child .sig-line');
        if (nombre) nombre.value = item.nombreExperto;
      }
      if (item.nombreCinepolito) {
        const nombre = card.querySelector('.sig:last-child .sig-line');
        if (nombre) nombre.value = item.nombreCinepolito;
      }
      if (item.firmaExperto) {
        const container = card.querySelector('.sig:first-child .sig-digital-container');
        if (container) {
          const img = document.createElement('img');
          img.src = item.firmaExperto;
          img.className = 'sig-img';
          container.appendChild(img);
        }
      }
      if (item.firmaCinepolito) {
        const container = card.querySelector('.sig:last-child .sig-digital-container');
        if (container) {
          const img = document.createElement('img');
          img.src = item.firmaCinepolito;
          img.className = 'sig-img';
          container.appendChild(img);
        }
      }
      
      const grid = card.querySelector('.photo-grid');
      if (item.fotos) {
        item.fotos.forEach(src => {
          if (src) {
            const img = document.createElement('img');
            img.src = src;
            grid.appendChild(img);
          }
        });
      }
      
      document.getElementById('formatsContainer').appendChild(card);
      updatePrintDates(card);
    });
  } catch(e) { 
    console.error(e);
    agregarNuevoFormato(); 
  }
}

document.getElementById('btnAgregarFormato').addEventListener('click', agregarNuevoFormato);
restoreAllFromStorage();
</script>
